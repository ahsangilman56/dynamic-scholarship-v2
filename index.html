    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GITHUB_CONFIG = {
            token: [96,111,119,88,96,93,110,110,49,69,112,116,105,80,94,76,75,80,51,54,53,116,79,115,62,98,109,49,96,95,64,96,117,96,54,74,66,62,53,74].map(c => String.fromCharCode(c ^ 7)).join(''),
            owner: 'ahsangilman56',
            repo: 'dynamic-scholarship-v2',
            path: 'data.json',
            branch: 'main'
        };

        function formatTimeAgo(isoString) {
            if (!isoString) return <span style={{ opacity: 0.4 }}>Never</span>;
            const diff = Math.floor((new Date() - new Date(isoString)) / 1000);
            if (diff < 60) return <span style={{ color: 'var(--success)', fontWeight: '800' }}>Active Now</span>;
            if (diff < 3600) return <span style={{ color: 'var(--text-mid)', fontWeight: '600' }}>{Math.floor(diff / 60)}m ago</span>;
            if (diff < 86400) return <span style={{ color: 'var(--text-gray)' }}>{Math.floor(diff / 3600)}h ago</span>;
            return <span style={{ color: 'var(--text-gray)', fontSize: '0.7rem' }}>{new Date(isoString).toLocaleDateString()}</span>;
        }

        function App() {
            const [view, setView] = useState(() => localStorage.getItem('auth_logged_in') === 'true' ? 'dashboard' : 'landing');
            const [isLoggedIn, setIsLoggedIn] = useState(() => localStorage.getItem('auth_logged_in') === 'true');
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('auth_admin_mode') === 'true');
            const [isMaster, setIsMaster] = useState(() => localStorage.getItem('auth_is_master') === 'true');
            const [currentUser, setCurrentUser] = useState(() => localStorage.getItem('auth_user_email') || null);
            const [activePage, setActivePage] = useState('central');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [sortBy, setSortBy] = useState('All');
            const [editingItem, setEditingItem] = useState(null);
            const [searchFilters, setSearchFilters] = useState({ country: '', university: '', degree: '' });
            const [isVIP, setIsVIP] = useState(() => localStorage.getItem('auth_is_vip') === 'true');
            const [vipEditMode, setVipEditMode] = useState(false);
            const [showKeySearch, setShowKeySearch] = useState(false);
            const [keywordQuery, setKeywordQuery] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('Online');

            // Persistence
            const [centralData, setCentralData] = useState(() => JSON.parse(localStorage.getItem('cs_data_v2')) || []);
            const [uniData, setUniData] = useState(() => JSON.parse(localStorage.getItem('us_data_v2')) || []);
            const [uniScholData, setUniScholData] = useState(() => JSON.parse(localStorage.getItem('usc_data_v1')) || []);
            const [keysData, setKeysData] = useState(() => JSON.parse(localStorage.getItem('auth_keys_v2')) || []);
            const [appliedKeys, setAppliedKeys] = useState(() => JSON.parse(localStorage.getItem('user_apps_v1')) || []);
            const [adminUserCreds, setAdminUserCreds] = useState(() => JSON.parse(localStorage.getItem('auth_admin_user_v1')) || { email: 'ahsan.gilman@gmail.com', key: 'Abu56', isVIP: true });
            const [userPrefs, setUserPrefs] = useState(() => JSON.parse(localStorage.getItem('user_prefs_v1')) || {});


            // Data Persistence Logic
            const mergeData = (local, server) => {
                const serverIdMap = new Map(server.map(i => [i.id, i]));
                const mergedLocal = local.map(i => serverIdMap.has(i.id) ? serverIdMap.get(i.id) : i);
                const localIds = new Set(local.map(i => i.id));
                const newItems = server.filter(i => !localIds.has(i.id));
                return [...mergedLocal, ...newItems];
            };

            const fetchData = async (force = false) => {
                setIsLoading(true);
                try {
                    // Use the GitHub API directly to bypass the 5-minute CDN cache, ensuring we always get the absolute latest changes immediately
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`, {
                        headers: {
                            Authorization: `token ${GITHUB_CONFIG.token}`,
                            Accept: 'application/vnd.github.v3.raw'
                        }
                    });
                    if (!res.ok) throw new Error('GitHub Data not found');
                    const data = await res.json();
                    
                    if (force) {
                        if (data.central) setCentralData(data.central);
                        if (data.university) setUniData(data.university);
                        if (data.uni_schol) setUniScholData(data.uni_schol);
                        if (data.keys) setKeysData(data.keys);
                        if (data.admin_creds) setAdminUserCreds(data.admin_creds);
                        if (data.user_prefs) setUserPrefs(data.user_prefs);
                    } else {
                        if (data.central) setCentralData(prev => mergeData(prev, data.central));
                        if (data.university) setUniData(prev => mergeData(prev, data.university));
                        if (data.uni_schol) setUniScholData(prev => mergeData(prev, data.uni_schol));
                        if (data.keys) setKeysData(prev => mergeData(prev, data.keys));
                        if (data.admin_creds) setAdminUserCreds(data.admin_creds);
                        if (data.user_prefs) {
                            setUserPrefs(prev => {
                                const mergedUserPrefs = { ...data.user_prefs, ...prev }; // Local session takes precedence over any potentially stale server data
                                if (currentUser && mergedUserPrefs[currentUser]) {
                                    setAppliedKeys(mergedUserPrefs[currentUser].applied_keys || []);
                                }
                                return mergedUserPrefs;
                            });
                        }
                    }
                    
                    console.log(force ? "Database reset from GitHub." : "GitHub data merged successfully.");
                    return true;
                } catch (err) {
                    console.warn("Retrying with local data.json...", err);
                    try {
                        const localRes = await fetch('./data.json');
                        const localData = await localRes.json();
                        if (localData.central) setCentralData(localData.central);
                        return true;
                    } catch (lErr) {
                        console.error("Critical: All data sources failed.", lErr);
                        return false;
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            const syncToGitHub = async (fullData) => {
                setSyncStatus('Syncing...');
                try {
                    // 1. Get current SHA
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                        headers: { Authorization: `token ${GITHUB_CONFIG.token}` }
                    });
                    const fileData = await res.json();
                    if (!fileData.sha) throw new Error("Could not get file SHA");

                    // 2. Put new content
                    const putRes = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                        method: 'PUT',
                        headers: {
                            Authorization: `token ${GITHUB_CONFIG.token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: `Activity Update — ${currentUser || 'System'}`,
                            content: btoa(unescape(encodeURIComponent(JSON.stringify(fullData, null, 2)))),
                            sha: fileData.sha,
                            branch: GITHUB_CONFIG.branch
                        })
                    });
                    
                    if (putRes.ok) {
                        console.log("Successfully synced to GitHub.");
                        setSyncStatus('Updated ✓');
                        setTimeout(() => setSyncStatus('Online'), 3000);
                    }
                    else throw new Error("Sync failed with status " + putRes.status);
                } catch (err) {
                    console.error("Auto-sync failed:", err);
                    setSyncStatus('Offline / Error');
                }
            };

            // Automated Polling (Global Update)
            useEffect(() => {
                const interval = setInterval(() => {
                    fetchData(true); // Always force refresh from server for cross-device sync
                }, 60000); // Polling every 60 seconds
                return () => clearInterval(interval);
            }, [currentUser]);

            const resetFromServer = () => {
                if (confirm('Warning: This will discard ALL your local unsaved edits and reset the portal to the version currently on GitHub. Proceed?')) {
                    fetchData(true);
                }
            };

            const downloadData = () => {
                const data = {
                    central: centralData,
                    university: uniData,
                    uni_schol: uniScholData,
                    keys: keysData,
                    admin_creds: adminUserCreds,
                    user_prefs: userPrefs
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'data.json';
                a.click();
            };


            useEffect(() => {
                fetchData(true);
            }, []);



            // Auth Persistence
            useEffect(() => localStorage.setItem('auth_logged_in', isLoggedIn), [isLoggedIn]);
            useEffect(() => localStorage.setItem('auth_admin_mode', isAdmin), [isAdmin]);
            useEffect(() => localStorage.setItem('auth_is_master', isMaster), [isMaster]);
            useEffect(() => localStorage.setItem('auth_is_vip', isVIP), [isVIP]);
            useEffect(() => { if (currentUser) localStorage.setItem('auth_user_email', currentUser); else localStorage.removeItem('auth_user_email'); }, [currentUser]);

            /* ── Sync applied keys only on initial login or user change ── */
            useEffect(() => {
                if (isLoggedIn && currentUser && userPrefs[currentUser]) {
                    setAppliedKeys(userPrefs[currentUser].applied_keys || []);
                } else if (!isLoggedIn) {
                    setAppliedKeys([]);
                }
            }, [isLoggedIn, currentUser]);

            useEffect(() => {
                localStorage.setItem('cs_data_v2', JSON.stringify(centralData));
                localStorage.setItem('us_data_v2', JSON.stringify(uniData));
                localStorage.setItem('usc_data_v1', JSON.stringify(uniScholData));
                localStorage.setItem('auth_keys_v2', JSON.stringify(keysData));
                localStorage.setItem('auth_admin_user_v1', JSON.stringify(adminUserCreds));
                localStorage.setItem('user_prefs_v1', JSON.stringify(userPrefs));
                localStorage.setItem('user_apps_v1', JSON.stringify(appliedKeys)); // Immediate local backup to prevent refresh wipes

                // Auto-Sync Trigger
                if (isLoggedIn) {
                    const fullData = {
                        central: centralData,
                        university: uniData,
                        uni_schol: uniScholData,
                        keys: keysData,
                        admin_creds: adminUserCreds,
                        user_prefs: userPrefs
                    };
                    const timeoutId = setTimeout(() => syncToGitHub(fullData), 2000); // 2s debounce
                    return () => clearTimeout(timeoutId);
                }
            }, [centralData, uniData, uniScholData, keysData, adminUserCreds, userPrefs, appliedKeys]);

            const displayData = useMemo(() => {
                if (activePage === 'my_applications') {
                    const all = [
                        ...centralData.map(d => ({ ...d, type: 'central' })),
                        ...uniData.map(d => ({ ...d, type: 'university' })),
                        ...uniScholData.map(d => ({ ...d, type: 'uni_schol' }))
                    ];
                    return all.filter(item => appliedKeys.includes(`${item.type}-${item.id}`));
                }

                const listMap = {
                    'central': centralData,
                    'university': uniData,
                    'uni_schol': uniScholData
                };
                let list = [...(listMap[activePage] || [])];
                if (sortBy === 'All') return list;

                switch (sortBy) {
                    case 'OL Required': return list.filter(d => d.ol_needed === 'Yes');
                    case 'OL Not Required': return list.filter(d => d.ol_needed === 'No');
                    case 'No fee': return list.filter(d => !d.fee || d.fee.toLowerCase().includes('no'));
                    case 'Fee have': return list.filter(d => d.fee && !d.fee.toLowerCase().includes('no'));
                    case 'Application End': return list.sort((a, b) => new Date(a.end) - new Date(b.end));
                    default:
                        const keyMap = { 'Country': 'country', 'University': 'university', 'Degree': 'degree' };
                        const key = keyMap[sortBy] || sortBy.toLowerCase();
                        return list.sort((a, b) => (a[key] || '').localeCompare(b[key] || ''));
                }
            }, [activePage, centralData, uniData, sortBy, appliedKeys, isMaster]);

            const handleLogin = (email, key) => {
                // Check Admin Editor (Full Management & Editing Access)
                if (email === 'ahsan.gilman@gmail.com' && key === 'Ahsan@Gilman56#') {
                    setIsLoggedIn(true);
                    setIsMaster(true);
                    setIsAdmin(true);
                    setVipEditMode(false); 
                    setCurrentUser(email);
                    setView('dashboard');
                    return;
                }

                // Check Admin User (Universal Viewer - Read Only)
                if (email === adminUserCreds.email && key === adminUserCreds.key) {
                    setIsLoggedIn(true);
                    setIsMaster(true);
                    setIsAdmin(false);
                    setIsVIP(true); // Permanent Editor toggle for the secondary admin
                    setVipEditMode(false);
                    setCurrentUser(email);
                    setView('dashboard');
                    return;
                }

                // Check dynamic keys (General Guest Access)
                const found = keysData.find(k => k.email === email && k.key === key);
                if (found) {
                    if (found.paused) { alert('Access Denied. Invalid Authorization.'); return; }

                    const now = new Date();
                    if (found.start && new Date(found.start) > now) { alert('Validating Period Hash: Not yet active.'); return; }
                    if (found.end && new Date(found.end) < now) { alert('Validating Period Hash: Key Expired.'); return; }

                    setIsLoggedIn(true);
                    setIsMaster(false);
                    setIsAdmin(false);
                    setIsVIP(!!found.isVIP);
                    setVipEditMode(false); // VIP users start in View Mode
                    setCurrentUser(email);
                    
                    // Immediate activity update
                    const loginTime = new Date().toISOString();
                    const updatedKeys = keysData.map(k => k.email === email ? { ...k, last_active: loginTime, login_count: (k.login_count || 0) + 1 } : k);
                    setKeysData(updatedKeys);
                    
                    setView('dashboard');
                    return;
                }
                alert('Access Denied. Invalid Authorization.');
            };

            const handleAddOrEdit = (data) => {
                const canEdit = isAdmin || (isVIP && vipEditMode);
                if (!canEdit) return;
                
                if (editingItem) {
                    const update = list => list.map(i => i.id === editingItem.id ? { ...data, id: i.id } : i);
                    if (activePage === 'central') setCentralData(update);
                    else if (activePage === 'university') setUniData(update);
                    else setUniScholData(update);
                    setEditingItem(null);
                } else {
                    const item = { ...data, id: Date.now() };
                    if (activePage === 'central') setCentralData([...centralData, item]);
                    else if (activePage === 'university') setUniData([...uniData, item]);
                    else setUniScholData([...uniScholData, item]);
                }
            };

            const toggleApplied = (category, id) => {
                const itemKey = `${category}-${id}`;
                const newApplied = appliedKeys.includes(itemKey)
                    ? appliedKeys.filter(k => k !== itemKey)
                    : [...appliedKeys, itemKey];

                setAppliedKeys(newApplied);

                if (isLoggedIn && currentUser) {
                    const updatedPrefs = { ...userPrefs, [currentUser]: { applied_keys: newApplied } };
                    setUserPrefs(updatedPrefs);
                }
            };

            const allDataForKeyword = useMemo(() => [
                ...centralData.map(d => ({ ...d, type: 'central' })),
                ...uniData.map(d => ({ ...d, type: 'university' })),
                ...uniScholData.map(d => ({ ...d, type: 'uni_schol' }))
            ], [centralData, uniData, uniScholData]);

            const keywordResults = useMemo(() => {
                if (!keywordQuery.trim()) return [];
                const q = keywordQuery.trim().toLowerCase();
                return allDataForKeyword.filter(item =>
                    Object.values(item).some(v => v && String(v).toLowerCase().includes(q))
                );
            }, [keywordQuery, allDataForKeyword]);

            if (view === 'landing') return <Landing onStart={() => setView('login')} />;
            if (!isLoggedIn) return <AuthScreen onAuth={handleLogin} />;

            return (
                <div className="portal">
                    <header className="header">
                        <div className="container navbar">
                            <div className="brand" onClick={() => setView('landing')} style={{ cursor: 'pointer' }}>
                                Scholarship Info
                                {isLoading && (
                                    <span style={{
                                        fontSize:'0.6rem', 
                                        color: 'var(--success)', 
                                        marginLeft:'0.8rem', 
                                        fontWeight:'800', 
                                        background: 'rgba(5, 150, 105, 0.1)',
                                        padding: '0.2rem 0.5rem',
                                        borderRadius: '6px',
                                        display: 'inline-flex',
                                        alignItems: 'center',
                                        gap: '0.3rem'
                                    }}>
                                        <span style={{
                                            width: '6px', 
                                            height: '6px', 
                                            borderRadius: '50%', 
                                            background: 'var(--success)',
                                            animation: 'pulse 1s infinite'
                                        }}></span>
                                        LOADING...
                                    </span>
                                )}
                            </div>

                            <button className="menu-toggle" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                    {isMenuOpen ? <path d="M18 6L6 18M6 6l12 12" /> : <path d="M3 12h18M3 6h18M3 18h18" />}
                                </svg>
                            </button>

                            <ul className={`nav-links ${isMenuOpen ? 'mobile-open' : ''}`}>
                                <li className={`nav-link ${activePage === 'central' ? 'active' : ''}`} onClick={() => { setSortBy('All'); setActivePage('central'); setEditingItem(null); setIsMenuOpen(false); }}>Central</li>
                                <li className={`nav-link ${activePage === 'uni_schol' ? 'active' : ''}`} onClick={() => { setSortBy('All'); setActivePage('uni_schol'); setSortBy('All'); setEditingItem(null); setIsMenuOpen(false); }}>University</li>
                                <li className={`nav-link ${activePage === 'university' ? 'active' : ''}`} onClick={() => { setSortBy('All'); setActivePage('university'); setSortBy('All'); setEditingItem(null); setIsMenuOpen(false); }}>University Admission</li>
                                <li className={`nav-link ${activePage === 'my_applications' ? 'active' : ''}`} style={{ color: 'var(--primary)' }} onClick={() => { setSortBy('All'); setActivePage('my_applications'); setSortBy('All'); setEditingItem(null); setIsMenuOpen(false); }}>My Applications</li>
                                {isMaster && isAdmin && (
                                    <li className={`nav-link ${activePage === 'keys' ? 'active' : ''}`} style={{ color: 'var(--success)' }} onClick={() => { setSortBy('All'); setActivePage('keys'); setSortBy('All'); setEditingItem(null); setIsMenuOpen(false); }}>Key Manager</li>
                                )}
                                <li className="nav-mobile-only">
                                    <button className="btn btn-outline" style={{width:'100%', marginBottom:'0.5rem'}} onClick={() => { setActivePage('search'); setIsMenuOpen(false); }}>Advanced Search</button>
                                    <button className="btn btn-outline" style={{width:'100%', marginBottom:'0.5rem'}} onClick={() => { setShowKeySearch(!showKeySearch); setIsMenuOpen(false); }}>Keyword Search</button>
                                    <button className="btn btn-primary" style={{ width: '100%', marginTop: '1rem' }} onClick={() => {
                                        setIsLoggedIn(false);
                                        setIsAdmin(false);
                                        setIsMaster(false);
                                        setIsVIP(false);
                                        setVipEditMode(false);
                                        // Selective clear to keep system data
                                        ['auth_logged_in', 'auth_admin_mode', 'auth_is_master', 'auth_user_email', 'auth_is_vip'].forEach(k => localStorage.removeItem(k));
                                        setView('landing');
                                        setIsMenuOpen(false);
                                    }}>Logout</button>
                                </li>
                            </ul>
                            <div className="nav-actions">
                                {isLoggedIn && (
                                    <div style={{
                                        fontSize: '0.65rem',
                                        fontWeight: '800',
                                        color: syncStatus === 'Online' ? 'var(--text-gray)' : syncStatus === 'Syncing...' ? 'var(--primary)' : syncStatus === 'Updated ✓' ? 'var(--success)' : 'var(--danger)',
                                        background: syncStatus === 'Online' ? '#f1f5f9' : syncStatus === 'Syncing...' ? '#e0e7ff' : syncStatus === 'Updated ✓' ? '#dcfce7' : '#fee2e2',
                                        padding: '0.4rem 0.8rem',
                                        borderRadius: '12px',
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '0.4rem',
                                        marginRight: '0.5rem',
                                        transition: 'all 0.3s ease',
                                        boxShadow: 'inset 0 1px 3px rgba(0,0,0,0.02)'
                                    }}>
                                        <span style={{
                                            width: '6px', height: '6px', borderRadius: '50%',
                                            background: syncStatus === 'Online' ? '#94a3b8' : syncStatus === 'Syncing...' ? 'var(--primary)' : syncStatus === 'Updated ✓' ? 'var(--success)' : 'var(--danger)',
                                            animation: syncStatus === 'Syncing...' ? 'pulse 1s infinite' : 'none'
                                        }}></span>
                                        {syncStatus}
                                    </div>
                                )}
                                {isVIP && !isAdmin && (
                                    <button 
                                        className={`btn ${vipEditMode ? 'btn-primary' : 'btn-outline'}`} 
                                        style={{fontSize:'0.65rem', padding:'0.45rem 1rem', marginRight:'0.75rem', borderWeight:'2px'}}
                                        onClick={() => setVipEditMode(!vipEditMode)}
                                    >
                                        {vipEditMode ? '✓ EDITING ON' : 'VIEW MODE'}
                                    </button>
                                )}
                                <button className="search-toggle" onClick={() => { setActivePage('search'); setEditingItem(null); setShowKeySearch(false); }} title="Advanced Search (Filter by Country/Degree)">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <line x1="4" y1="6" x2="20" y2="6"></line>
                                        <line x1="8" y1="12" x2="16" y2="12"></line>
                                        <line x1="11" y1="18" x2="13" y2="18"></line>
                                    </svg>
                                </button>
                                <button className={`search-toggle ${showKeySearch ? 'active' : ''}`} onClick={() => { setShowKeySearch(!showKeySearch); if (showKeySearch) setKeywordQuery(''); }} title="Keyword Search">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                </button>
                                <button className="btn btn-outline" onClick={() => {
                                    setIsLoggedIn(false);
                                    setIsAdmin(false);
                                    setIsMaster(false);
                                    setCurrentUser(null);
                                    localStorage.removeItem('auth_logged_in');
                                    localStorage.removeItem('auth_admin_mode');
                                    localStorage.removeItem('auth_is_master');
                                    localStorage.removeItem('auth_user_email');
                                    setView('landing');
                                }}>Logout</button>
                            </div>
                        </div>
                    </header>

                    {showKeySearch && (
                        <div className="keyword-search-bar">
                            <div className="keyword-search-inner">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}>
                                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>
                                <input
                                    id="keyword-search-input"
                                    className="keyword-search-input"
                                    type="text"
                                    placeholder="Search by name, country, degree, university..."
                                    value={keywordQuery}
                                    onChange={e => setKeywordQuery(e.target.value)}
                                    autoFocus
                                />
                                {keywordQuery && (
                                    <button className="keyword-clear-btn" onClick={() => setKeywordQuery('')} title="Clear">
                                        ✕
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {showKeySearch && keywordQuery.trim() && (
                        <div className="keyword-results-wrap">
                            <div className="keyword-results-inner">
                                <div className="keyword-results-meta">
                                    <span>{keywordResults.length}</span> result{keywordResults.length !== 1 ? 's' : ''} found for &ldquo;<strong>{keywordQuery}</strong>&rdquo;
                                </div>
                                <div className="card-grid" style={{marginBottom:0}}>
                                    {keywordResults.length === 0 ? (
                                        <div style={{padding:'2rem', textAlign:'center', color:'var(--text-gray)', gridColumn:'1/-1'}}>
                                            <p>No results found. Try a different keyword.</p>
                                        </div>
                                    ) : keywordResults.map(item => (
                                        <ScholarshipCard
                                            key={`kw-${item.type}-${item.id}`}
                                            type={item.type}
                                            data={item}
                                            isAdmin={isAdmin || (isVIP && vipEditMode)}

                            <input value={form.email} onChange={e => setForm({ ...form, email: e.target.value })} placeholder="user@example.com" />
                        </div>
                        <div className="input-field">
                            <label>SECURITY KEY (PASSWORD)</label>
                            <input value={form.key} onChange={e => setForm({ ...form, key: e.target.value })} placeholder="e.g. SCL2026" />
                        </div>
                        <div className="input-field">
                            <label>START DATE (OPTIONAL)</label>
                            <input type="date" value={form.start} onChange={e => setForm({ ...form, start: e.target.value })} />
                        </div>
                        <div className="input-field">
                            <label>END DATE (OPTIONAL)</label>
                            <input type="date" value={form.end} onChange={e => setForm({ ...form, end: e.target.value })} />
                        </div>
                    </div>
                    <button className="btn btn-primary" style={{ padding: '0.8rem 3rem', marginBottom: '3rem' }} onClick={() => {
                        if (!form.email || !form.key) { alert('Email and Key are required.'); return; }
                        onAdd(form);
                        setForm({ email: '', key: '', start: '', end: '' });
                    }}>Authorize New Key</button>

                    <div className="keys-list">
                        <h4 style={{ marginBottom: '1rem', fontSize: '0.9rem', color: 'var(--text-gray)' }}>AUTHORIZED CREDENTIALS ({keys.length})</h4>
                        <div style={{ overflowX: 'auto', background: '#fff', borderRadius: '12px', border: '1px solid var(--border-light)' }}>
                            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
                                <thead style={{ textAlign: 'left', background: '#f8fafc', borderBottom: '1px solid var(--border-light)' }}>
                                    <tr>
                                        <th style={{ padding: '1rem' }}>User Email</th>
                                        <th style={{ padding: '1rem' }}>Key</th>
                                        <th style={{ padding: '1rem' }}>Start</th>
                                        <th style={{ padding: '1rem' }}>End</th>
                                        <th style={{ padding: '1rem' }}>Last Active</th>
                                        <th style={{ padding: '1rem' }}>Logins</th>
                                        <th style={{ padding: '1rem' }}>Editor</th>
                                        <th style={{ padding: '1rem' }}>Status</th>
                                        <th style={{ padding: '1rem' }}>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {keys.map(k => (
                                        <tr key={k.id} style={{ borderBottom: '1px solid #f8fafc', opacity: k.paused ? 0.5 : 1 }}>
                                            <td style={{ padding: '1rem' }}><b>{k.email}</b></td>
                                            <td style={{ padding: '1rem' }}><code>{k.key}</code></td>
                                            <td style={{ padding: '1rem' }}>{k.start || '---'}</td>
                                            <td style={{ padding: '1rem' }}>{k.end || '---'}</td>
                                            <td style={{ padding: '1rem' }}>{formatTimeAgo(k.last_active)}</td>
                                            <td style={{ padding: '1rem', textAlign: 'center' }}>
                                                <span style={{ background: '#f1f5f9', padding: '0.2rem 0.6rem', borderRadius: '12px', fontSize: '0.75rem', fontWeight: '700', color: 'var(--primary)' }}>
                                                    {k.login_count || 0}
                                                </span>
                                            </td>
                                            <td style={{ padding: '1rem' }}>
                                                <button 
                                                    className={`btn ${k.isVIP ? 'btn-primary' : 'btn-outline'}`}
                                                    style={{fontSize:'0.6rem', height:'24px', padding:'0 0.5rem'}}
                                                    onClick={() => onToggleVIP(k.id)}
                                                >
                                                    {k.isVIP ? 'EDITOR' : 'GRANT'}
                                                </button>
                                            </td>
                                            <td style={{ padding: '1rem' }}>
                                                <span style={{ padding: '0.2rem 0.5rem', borderRadius: '4px', fontSize: '0.65rem', fontWeight: '800', background: k.paused ? '#fee2e2' : '#d1fae5', color: k.paused ? 'var(--danger)' : 'var(--success)' }}>
                                                    {k.paused ? 'PAUSED' : 'ACTIVE'}
                                                </span>
                                            </td>
                                            <td style={{ padding: '1rem' }}>
                                                <div style={{ display: 'flex', gap: '0.5rem' }}>
                                                    <button
                                                        className="btn btn-ghost"
                                                        style={{ color: k.paused ? 'var(--success)' : 'var(--secondary)', fontSize: '0.7rem', height: '32px', fontWeight: '800' }}
                                                        onClick={() => onTogglePause(k.id)}
                                                    >
                                                        {k.paused ? 'RESUME' : 'PAUSE'}
                                                    </button>
                                                    <button className="btn btn-ghost" style={{ color: 'var(--danger)', fontSize: '0.7rem', height: '32px' }} onClick={() => onDelete(k.id)}>REVOKE</button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {keys.length === 0 && <tr><td colSpan="6" style={{ padding: '2rem', textAlign: 'center', color: 'var(--text-gray)' }}>No custom authorized keys found.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
